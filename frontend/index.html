<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Fast latency checks for gaming, streaming, and daily internet troubleshooting."
    />
    <title>WhatsMyPing</title>
    <script>
      const cloudflareAnalyticsPlaceholder = '__VITE_CLOUDFLARE_ANALYTICS_TOKEN__'
      const cloudflareAnalyticsToken = '%VITE_CLOUDFLARE_ANALYTICS_TOKEN%'
      if (cloudflareAnalyticsToken && cloudflareAnalyticsToken !== cloudflareAnalyticsPlaceholder) {
        const script = document.createElement('script')
        script.defer = true
        script.src = 'https://static.cloudflareinsights.com/beacon.min.js'
        script.setAttribute('data-cf-beacon', JSON.stringify({ token: cloudflareAnalyticsToken }))
        document.head.appendChild(script)
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
